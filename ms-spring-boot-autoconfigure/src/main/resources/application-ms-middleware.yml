# 中间件配置
ms:
  middleware:
    # 缓存配置
    cache:
      # 本地缓存配置
      local:
        # 缓存大小
        size: 1000
        # 缓存过期时间（秒）
        ttl: 3600
        # 是否启用
        enabled: true
      # 分布式缓存配置
      distributed:
        # 缓存过期时间（秒）
        ttl: 7200
        # 是否启用
        enabled: true
      # 缓存一致性配置
      consistency:
        # 是否启用一致性
        enabled: false
        # 是否启用多级缓存一致性
        multiLevelEnabled: true
    # 消息队列配置
    mq:
      # 是否启用
      enabled: true
      # RabbitMQ配置
      rabbit:
        # 主机
        host: 192.168.100.102
        # 端口
        port: 5672
        # 用户名
        username: guest
        # 密码
        password: guest
        # 虚拟主机
        virtualHost: /
        # 连接超时时间（毫秒）
        connectionTimeout: 30000
        # 自动声明交换机和队列
        autoDeclare: true
      # 消息追踪配置
      trace:
        # 是否启用
        enabled: true
        # 最大缓存大小
        maxCacheSize: 10000
        # 追踪过期时间（分钟）
        expirationMinutes: 30
      # 幂等配置
      idempotent:
        # 是否启用
        enabled: true
        # 幂等键前缀
        prefix: "mq:idempotent:"
        # 过期时间（小时）
        expirationHours: 24
    # Redis配置
    redis:
      # 主机
      host: 192.168.100.102
      # 端口
      port: 6379
      # 密码
      password: 1234
      # 数据库
      database: 0
