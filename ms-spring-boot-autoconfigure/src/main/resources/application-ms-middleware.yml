# 中间件配置
ms:
  middleware:
    # 缓存配置
    cache:
      # 本地缓存配置
      local:
        # 缓存大小
        size: 1000
        # 缓存过期时间（秒）
        ttl: 3600
        # 是否启用
        enabled: true
      # 分布式缓存配置
      distributed:
        # 缓存过期时间（秒）
        ttl: 7200
        # 是否启用
        enabled: true
      # 缓存一致性配置
      consistency:
        # 是否启用一致性
        enabled: false
        # 是否启用多级缓存一致性
        multiLevelEnabled: true
    # 消息队列配置
    mq:
      # 是否启用
      enabled: true
      # RabbitMQ配置
      rabbit:
        # 主机
        host: 192.168.100.102
        # 端口
        port: 5672
        # 用户名
        username: guest
        # 密码
        password: guest
        # 虚拟主机
        virtualHost: /
        # 连接超时时间（毫秒）
        connectionTimeout: 30000
        # 自动声明交换机和队列
        autoDeclare: true
        # 是否在应用启动时清空指定队列（仅建议开发环境开启）
        purgeOnStartup: false
        # 启动时需要清空的队列列表
        purgeQueues: []
      # 消息追踪配置
      trace:
        # 是否启用
        enabled: true
        # 最大缓存大小
        maxCacheSize: 10000
        # 追踪过期时间（分钟）
        expirationMinutes: 30
      # 幂等配置
      idempotent:
        # 是否启用
        enabled: true
        # 幂等键前缀
        prefix: "mq:idempotent:"
        # 过期时间（小时）
        expirationHours: 24
    # 中间件自治（默认关闭）
    autonomy:
      enabled: false
      scan-interval-ms: 30000
      auto-execute-max-risk: LOW
      auto-execute-min-confidence: 0.7
      auto-execute-min-confidence-low: 0.55
      cache-hit-rate-warn-threshold: 0.5
      mq-failed-warn-threshold: 10
      mq:
        throttle-limit: 30
        throttle-window-seconds: 60
        delayed-retry-batch-size: 10
        delayed-retry-delay-ms: 5000
      ledger:
        type: memory
        max-runs: 200
        key-prefix: ms:autonomy:run
        ttl-hours: 168
      orchestrator:
        distributed-lock-enabled: false
        tick-lock-ttl-seconds: 30
      # tenant-id: ""   # 可选，覆盖 spring.application.name 作为账本/tick 锁隔离键
      # Step 5：自治规则外置（可选，未配置则用内置默认）
      # 完整示例见 classpath:ms-middleware-autonomy-rules.example.yml
      # rules:
      #   incident-detection:
      #     - condition: redis-unhealthy
      #       incident-type: REDIS_UNAVAILABLE
      #   incidents:
      #     MQ_DEGRADED:
      #       actions:
      #         - type: THROTTLE_CONSUMER
      #           order: 1
      #           reason: "自定义限流理由"
    # AI 控制台（需同时开启 autonomy；默认关闭）
    console:
      enabled: false
      base-path: /ms-console
      llm-enabled: false
      # chat-enabled: false   # 已废弃，请用 llm-enabled
      # auth-token: ""   # 非空时启用控制台 API 鉴权（Header X-MS-Console-Token 或 ?token=）
      llm:
        base-url: https://api.deepseek.com
        api-key: ${MS_LLM_API_KEY:}
        model: deepseek-chat
        temperature: 0.2
        timeout-seconds: 60
        grounding-mode: relaxed   # strict = 运维类问题强制预调 Insight Tool
      context:
        enabled: true
        max-chars: 2048
        dialog-user-messages: 2
        timeline-event-limit: 5
        wartime-trace-limit: 5
        run-context-cache-seconds: 30
        auto-bind-single-active-run: true   # 仅跟进/诊断意图才绑单活跃 run；主页全局问题不绑
      # Phase 5.4 RAG（默认关闭；PG 用 102 虚机 pgvector；embedding 用通义，勿复用 DeepSeek）
      rag:
        enabled: false
        jdbc-url: "jdbc:postgresql://192.168.100.102:5432/ms_rag"
        username: ms
        password: ms
        top-k: 5
        chunk-size: 800
        max-run-docs-per-tenant: 200
        embedding:
          base-url: "https://dashscope.aliyuncs.com/compatible-mode/v1"
          api-key: ${MS_RAG_EMBEDDING_API_KEY:}
          model: text-embedding-v3
          dimensions: 1024
          timeout-seconds: 30
    # Redis配置
    redis:
      # 主机
      host: 192.168.100.102
      # 端口
      port: 6379
      # 密码
      password: 1234
      # 数据库
      database: 0
